name: מכרזים חקלאיים יומי

on:
  schedule:
    # כל יום ב-04:00 UTC (~07:00 בקיץ / 06:00 בחורף שעון ישראל)
    - cron: "0 4 * * *"
  workflow_dispatch:   # מאפשר הרצה ידנית מכפתור ב-GitHub

permissions:
  contents: write       # כדי לשמור בחזרה את seen.json

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: התקנת תלויות
        run: pip install -r requirements.txt

      - name: הרצת המערכת ושליחת מייל
        env:
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_APP_PASSWORD: ${{ secrets.SMTP_APP_PASSWORD }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
        run: python main.py

      - name: שמירת זיכרון המכרזים
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen.json
          git diff --staged --quiet || git commit -m "עדכון זיכרון מכרזים [skip ci]"
          git push
